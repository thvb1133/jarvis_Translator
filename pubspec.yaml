name: jarvis_translator
description: "JARVIS Translator — a cross-platform live voice translator (Android + Desktop)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  provider: ^6.1.2
  # Networking for online providers
  http: ^1.2.2
  # Cross-platform audio capture (Android + Windows/Linux/macOS)
  record: ^5.1.2
  # Cross-platform audio playback for spoken translations
  audioplayers: ^6.1.0
  # Runtime permission handling (microphone)
  permission_handler: ^11.3.1
  # Filesystem paths for temporary audio buffers
  path_provider: ^2.1.4
  path: ^1.9.0
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
